sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "user"
default_permissions = "10xdev-workspace"

[windows]
sandbox = "unelevated"
sandbox_private_desktop = false

[permissions.10xdev-workspace]
extends = ":workspace"

[permissions.10xdev-workspace.filesystem.":workspace_roots"]
".codex/.tmp" = "write"
".git" = "write"

[[hooks.PostToolUse]]
matcher = "apply_patch|Edit|Write"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "node \"$(git rev-parse --show-toplevel)/.codex/hooks/post_tool_use_quality_gate.mjs\""
commandWindows = "powershell.exe -NoProfile -ExecutionPolicy Bypass -File .codex\\hooks\\post_tool_use_quality_gate.ps1"
timeout = 30
statusMessage = "Running repo quality gate"
